version: "3.8"

networks:
  cloud-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

volumes:
  minio-data:
  postgres-data:
  redis-data:
  prometheus-data:
  grafana-data:
  loki-data:

services:
  minio:
    image: minio/minio:latest
    container_name: cloud-storage
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: CloudPass2024!
      MINIO_BROWSER_REDIRECT_URL: https://app.sughara.my.id/storage-console/
    networks:
      - cloud-net
    mem_limit: 256m
    restart: unless-stopped

  postgres:
    image: postgres:15-alpine
    container_name: cloud-db
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: clouduser
      POSTGRES_PASSWORD: CloudPass2024!
      POSTGRES_DB: clouddb
    networks:
      - cloud-net
    mem_limit: 256m
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: cloud-cache
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes --maxmemory 32mb --maxmemory-policy allkeys-lru
    networks:
      - cloud-net
    mem_limit: 64m
    restart: unless-stopped

  # ── Monitoring Stack ──────────────────────────────────────
  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    pid: host
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--path.rootfs=/rootfs'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    networks:
      - cloud-net
    mem_limit: 64m
    restart: unless-stopped

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:latest
    container_name: postgres-exporter
    environment:
      DATA_SOURCE_NAME: "postgresql://clouduser:CloudPass2024!@cloud-db:5432/clouddb?sslmode=disable"
    networks:
      - cloud-net
    depends_on:
      - postgres
    mem_limit: 64m
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: cloud-metrics
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--web.external-url=https://app.sughara.my.id/metrics/'
      - '--web.route-prefix=/'
    networks:
      - cloud-net
    depends_on:
      - node-exporter
      - postgres-exporter
    mem_limit: 256m
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: cloud-dashboard
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_SERVER_DOMAIN: app.sughara.my.id
      GF_SERVER_ROOT_URL: "%(protocol)s://%(domain)s/monitor/"
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
      GF_SECURITY_ALLOW_EMBEDDING: "true"
      GF_SECURITY_COOKIE_SECURE: "false"
      GF_SECURITY_COOKIE_SAMESITE: lax
    networks:
      - cloud-net
    depends_on:
      - prometheus
      - loki
    mem_limit: 256m
    restart: unless-stopped

  # ── Logging Stack ─────────────────────────────────────────
  loki:
    image: grafana/loki:latest
    container_name: cloud-logs
    ports:
      - "3100:3100"
    volumes:
      - loki-data:/loki
    networks:
      - cloud-net
    mem_limit: 128m
    restart: unless-stopped

  promtail:
    image: grafana/promtail:latest
    container_name: cloud-promtail
    volumes:
      - ./promtail/config.yml:/etc/promtail/config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    command: -config.file=/etc/promtail/config.yml
    networks:
      - cloud-net
    depends_on:
      - loki
    mem_limit: 64m
    restart: unless-stopped

  # ── Gateway ───────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: cloud-gateway
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./html:/usr/share/nginx/html:ro
    networks:
      - cloud-net
    depends_on:
      - minio
      - grafana
    mem_limit: 64m
    restart: unless-stopped

  # ── Core API ──────────────────────────────────────────────
  iaas-api:
    build:
      context: ./iaas-api
      dockerfile: Dockerfile
    container_name: iaas-api
    ports:
      - "8000:8000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./iaas-api:/app
    environment:
      SECRET_KEY: iaas-jetson-rahasia-ganti-ini
      DATABASE_URL: postgresql://clouduser:CloudPass2024!@cloud-db:5432/clouddb
      PYTHONDONTWRITEBYTECODE: "1"
      MINIO_ENDPOINT: cloud-storage:9000
      MINIO_ACCESS_KEY: admin
      MINIO_SECRET_KEY: CloudPass2024!
      MINIO_SECURE: "false"
      PUBLIC_HOST: 192.168.1.2
      FLOATING_PORT_START: "2300"
      FLOATING_PORT_END: "2399"
      REDIS_URL: redis://cloud-cache:6379/0
    networks:
      - cloud-net
    depends_on:
      - redis
      - postgres
    mem_limit: 256m
    restart: unless-stopped
