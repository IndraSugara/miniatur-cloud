events { worker_connections 1024; }
http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Cloudflare Tunnel terminates SSL → internal is always HTTP
    # Map original proto from CF headers, fallback to https
    map $http_x_forwarded_proto $real_scheme {
        default $http_x_forwarded_proto;
        ""      "https";
    }

    server {
        listen 80;
        server_name _;

        # ── MinIO Console (sub-path) ─────────────────────────
        location /storage-console/ {
            proxy_pass http://cloud-storage:9001/;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            # Catch MinIO Console SPA asset requests
            proxy_intercept_errors off;
        }

        # Fallback: MinIO Console assets loaded from root path
        # MinIO SPA references /static/js/xxx.js etc without sub-path prefix
        location ~* ^/(static|login|favicon\.ico|manifest\.json|main\.[a-f0-9]+\.js) {
            proxy_pass http://cloud-storage:9001;
            proxy_set_header Host $http_host;
            proxy_set_header X-Forwarded-Proto https;
        }

        # ── MinIO S3 API ─────────────────────────────────────
        location /storage/ {
            proxy_pass http://cloud-storage:9000/;
            proxy_set_header Host $http_host;
            proxy_set_header X-Forwarded-Proto https;
        }

        # ── Grafana (sub-path) ───────────────────────────────
        location ^~ /monitor/ {
            proxy_pass http://cloud-dashboard:3000/;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # ── Prometheus ───────────────────────────────────────
        location /metrics/ {
            proxy_pass http://cloud-metrics:9090/;
            proxy_set_header Host $http_host;
            proxy_set_header X-Forwarded-Proto https;
        }

        # ── IaaS API ─────────────────────────────────────────
        location /api/ {
            proxy_pass http://iaas-api:8000/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-Proto https;
        }

        # ── Static files ─────────────────────────────────────
        location ~* \.(js|mjs)$ {
            root /usr/share/nginx/html;
            types { text/javascript js mjs; }
            default_type text/javascript;
            try_files $uri =404;
        }
        location /assets/css/ {
            root /usr/share/nginx/html;
            types { text/css css; }
            default_type text/css;
            try_files $uri =404;
        }
        location / {
            root /usr/share/nginx/html;
            try_files $uri $uri/ =404;
        }
    }
}
