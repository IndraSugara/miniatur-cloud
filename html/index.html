<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Miniatur Cloud — Mini IaaS platform for managing compute instances, networks, and storage." />
    <title>Miniatur Cloud Console</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="stylesheet" href="/assets/css/app.css" />
    <!-- xterm.js -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.css" />
    <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.js"></script>
  </head>
  <body>
    <div id="login-screen" class="login-screen">
      <div class="login-card">
        <h1 class="login-title">Miniatur Cloud</h1>
        <p class="login-subtitle">Masuk untuk mengelola compute, network, dan storage.</p>
        <form id="login-form" class="stack-md">
          <label class="field-label" for="login-username">Username</label>
          <input id="login-username" name="username" type="text" autocomplete="username" required />

          <label class="field-label" for="login-password">Password</label>
          <input
            id="login-password"
            name="password"
            type="password"
            autocomplete="current-password"
            required
          />

          <button id="login-submit" type="submit" class="btn btn-primary btn-block">Masuk</button>
        </form>
        <p id="login-error" class="message error hidden"></p>
      </div>
    </div>

    <div id="app-shell" class="app-shell hidden">
      <header class="topbar">
        <div class="brand">
          <span class="brand-mark">MC</span>
          <div>
            <div class="brand-title">Miniatur Cloud Console</div>
            <div class="brand-sub">Jetson Nano IaaS</div>
          </div>
        </div>

        <div class="topbar-actions">
          <button id="open-docs" class="btn btn-ghost">API Docs</button>
          <button id="open-monitor" class="btn btn-ghost">Grafana</button>
          <button id="open-storage" class="btn btn-ghost">MinIO</button>
          <div id="user-chip" class="user-chip">-</div>
          <button id="logout-btn" class="btn btn-danger">Logout</button>
        </div>
      </header>

      <div class="workspace">
        <aside class="sidebar">
          <button class="nav-item active" data-view="dashboard">Dashboard</button>
          <button class="nav-item" data-view="compute">Compute</button>
          <button class="nav-item" data-view="network">Network</button>
          <button class="nav-item" data-view="storage">Storage</button>
          <button class="nav-item" data-view="catalog">Catalog</button>
          <button class="nav-item" data-view="monitoring">Monitoring</button>
          <button class="nav-item" data-view="admin">Admin</button>
        </aside>

        <main class="content">
          <div class="content-header">
            <div>
              <h2 id="view-title">Dashboard</h2>
              <p id="view-subtitle">Ringkasan sumber daya cloud miniatur.</p>
            </div>
            <button id="refresh-view" class="btn btn-ghost">Refresh</button>
          </div>
          <section id="view-root" class="view-root"></section>
        </main>
      </div>
    </div>

    <div id="modal-root"></div>
    <div id="toast-root" class="toast-root"></div>

    <script type="module" src="/assets/js/main.js"></script>
  </body>
</html>
