name: CI/CD Jetson Nano via Tunnel SSH

on:
  push:
    branches:
      - main # Trigger jalan setiap kali Anda push ke branch main

jobs:
  deploy:
    runs-on: ubuntu-latest # Menggunakan server cloud GitHub untuk memerintah

    steps:
      - name: Install Cloudflare Client
        run: |
          # 1. Unduh dan pasang kunci repositori resmi Cloudflare
          sudo mkdir -p /etc/apt/keyrings
          curl -fsSL https://cloudflare.com | sudo tee /etc/apt/keyrings/cloudflare-main.gpg > /dev/null

          # 2. Tambahkan repositori Cloudflare ke daftar sistem
          echo "deb [signed-by=/etc/apt/keyrings/cloudflare-main.gpg] https://cloudflare.com stable main" | sudo tee /etc/apt/sources.list.distrib.d/cloudflare.list || echo "deb [signed-by=/etc/apt/keyrings/cloudflare-main.gpg] https://cloudflare.com stable main" | sudo tee /etc/apt/sources.list.d/cloudflare.list

          # 3. Perbarui paket dan pasang cloudflared secara native
          sudo apt-get update && sudo apt-get install -y cloudflared

      - name: Eksekusi Perintah di Jetson via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          proxy_command: cloudflared access ssh --id ${{ secrets.CF_CLIENT_ID }} --secret ${{ secrets.CF_CLIENT_SECRET }} --target %h:%p
          script: |
            cd /home/sugara-jetson/miniatur-cloud
            git pull origin main
            echo "--- DEPLOY BERHASIL ---"
