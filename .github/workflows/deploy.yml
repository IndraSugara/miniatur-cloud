name: CI/CD Jetson Nano via Tunnel SSH

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Install Cloudflare Client
        run: |
          set -euo pipefail
          # 1. Unduh file biner cloudflared resmi (Linux amd64)
          curl -fsSL --retry 3 --retry-delay 2 \
            https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 \
            -o /tmp/cloudflared
          # 2. Validasi singkat agar tidak salah unduh halaman HTML
          if head -c 32 /tmp/cloudflared | grep -qi "<!doctype html>"; then
            echo "Gagal: file yang terunduh adalah HTML, bukan biner cloudflared."
            exit 1
          fi
          # 3. Install ke PATH dan beri izin eksekusi
          sudo install -m 0755 /tmp/cloudflared /usr/local/bin/cloudflared
          rm -f /tmp/cloudflared
          # 4. Tes apakah cloudflared sudah aktif
          cloudflared --version

      - name: Eksekusi Perintah di Jetson via SSH + Cloudflare Access
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USERNAME: ${{ secrets.SSH_USERNAME }}
          SSH_PASSWORD: ${{ secrets.SSH_PASSWORD }}
          CF_CLIENT_ID: ${{ secrets.CF_CLIENT_ID }}
          CF_CLIENT_SECRET: ${{ secrets.CF_CLIENT_SECRET }}
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y sshpass
          PROXY_CMD="cloudflared access ssh --hostname %h --id ${CF_CLIENT_ID} --secret ${CF_CLIENT_SECRET}"
          sshpass -p "${SSH_PASSWORD}" ssh \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            -o "ProxyCommand=${PROXY_CMD}" \
            -p "${SSH_PORT}" \
            "${SSH_USERNAME}@${SSH_HOST}" \
            "cd /home/sugara-jetson/miniatur-cloud \
            && (git stash push -u -m \"auto-stash-before-deploy-\$(date +%Y%m%d-%H%M%S)\" || true) \
            && OLD_HEAD=\$(git rev-parse HEAD) \
            && git fetch origin main \
            && git reset --hard origin/main \
            && git clean -fd \
            && NEW_HEAD=\$(git rev-parse HEAD) \
            && CHANGED_FILES=\$(git diff --name-only \"\$OLD_HEAD\" \"\$NEW_HEAD\") \
            && if printf '%s\n' \"\$CHANGED_FILES\" | grep -qE '^docker-compose\.yml$'; then docker compose up -d; fi \
            && if printf '%s\n' \"\$CHANGED_FILES\" | grep -qE '^iaas-api/'; then docker compose build iaas-api && docker compose up -d iaas-api; fi \
            && if printf '%s\n' \"\$CHANGED_FILES\" | grep -qE '^(html/|nginx/)'; then docker exec cloud-gateway nginx -s reload; fi \
            && echo '--- DEPLOY BERHASIL ---'"
