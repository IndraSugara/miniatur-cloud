name: CI/CD Jetson Nano via Tunnel SSH

on:
  push:
    branches:
      - main # Trigger jalan setiap kali Anda push ke branch main

jobs:
  deploy:
    runs-on: ubuntu-latest # Menggunakan server cloud GitHub untuk memerintah

    steps:
      - name: Install Cloudflare Client
        run: |
          # 1. Unduh file biner cloudflared langsung
          sudo curl -L https://github.com -o /usr/local/bin/cloudflared
          # 2. Berikan izin akses eksekusi ke sistem
          sudo chmod +x /usr/local/bin/cloudflared
          # 3. Tes apakah cloudflared sudah aktif
          cloudflared --version

      - name: Eksekusi Perintah di Jetson via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          proxy_command: cloudflared access ssh --id ${{ secrets.CF_CLIENT_ID }} --secret ${{ secrets.CF_CLIENT_SECRET }} --target %h:%p
          script: |
            cd /home/sugara-jetson/miniatur-cloud
            git pull origin main
            echo "--- DEPLOY BERHASIL ---"
